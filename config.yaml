# Text Reading with LLM - Default Configuration
# Override per-run values via CLI args or Makefile variables

# Input (BOOK_DIR contains book.xml)
book_dir: sample

# Output base directory (actual output will be in data/{content_hash}/)
output: data

# ===========================================
# VOICEVOX Settings
# ===========================================
voicevox:
  # VOICEVOX Core directory (contains onnxruntime, dict, model)
  dir: voicevox_core

  # Style ID (speaker + style combination)
  # 青山龍星 (ノーマル): 13
  # ずんだもん (ノーマル): 3
  # 四国めたん (ノーマル): 2
  # 春日部つむぎ (ノーマル): 8
  style_id: 13

  # Speech speed (1.0 = normal)
  speed: 1.0

  # Pitch adjustment (0.0 = normal)
  pitch: 0.0

  # Volume (1.0 = normal)
  volume: 1.0

# ===========================================
# Speaker Settings (for dialogue conversion)
# ===========================================
speakers:
  SPEAKER_A:
    name: "教授"
    role: "解説役。専門知識を持ち、丁寧に説明する"
  SPEAKER_B:
    name: "助手"
    role: "聞き手。質問し、理解を確認する。丁寧な口調"

# ===========================================
# Processing Settings
# ===========================================
# Maximum characters per TTS chunk (too long may cause quality issues)
max_chunk_chars: 500

# ===========================================
# LLM Settings (Ollama)
# ===========================================
# 用途別（profile）に ollama の生成パラメータを指定する。
# defaults に profile の値を上書きマージして利用する。
llm:
  defaults:
    temperature: 0.3
    num_predict: 4096
  profiles:
    # 読み辞書生成: 正確性重視で低温度
    reading_dict:
      temperature: 0.2
    # 対話生成: 多様性を上げつつ繰り返しを抑制
    dialogue:
      temperature: 0.5
      repeat_penalty: 1.2
    # 導入/結論ナレーション: 少し温度を上げて自然な表現に
    introduction:
      temperature: 0.4
    conclusion:
      temperature: 0.4

# ===========================================
# Chapter Settings
# ===========================================
# Enable chapter-based processing (generates separate audio per chapter)
chapters:
  enabled: true
  # Start page for TOC extraction (skip front matter, TOC pages, etc.)
  start_page: 15

