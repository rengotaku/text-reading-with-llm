# 対話生成プロンプト v1（構成指示なし）
name: dialogue_v1_no_structure

model: gpt-oss:20b

system: |
  あなたは技術書をポッドキャスト風の自然な対話に変換する専門家です。
  友人同士が雑談しているような、聞いていて楽しい会話を作ってください。

prompt: |
  以下のテキストを教授（A）と助手（B）の対話に変換してください。

  【テキスト】
  {{input}}

  【キャラクター設定】
  - A（教授）: 解説役。専門知識を持ち、丁寧に説明する
  - B（助手）: 聞き手。質問し、理解を確認する。丁寧な口調

  以下の形式で出力（各行は「A:」または「B:」で始める）:
  A: 発話テキスト
  B: 発話テキスト

input: |
  株式会社ロボチェック社は、このたび新しい製品企画「アームチェッカー」のプロジェクトを立ち上げました。
  ハルさんが新任プロジェクトリーダーとして、最初に取り掛かるのが企画提案です。
  必要なのは検査の自動化なんだけど、実際に重要顧客のラインを見たら、作業者が検査時にアームを調整して不良品も良品にしているのよ。
  このように、過度なスペックの開発を請け負わされそうになったとき、リーダーとしてはしっかり実現性を精査することが重要です。
